<html>
    <head></head>
        <title>Bài 1</title>
    </head>
    <body>
        <script language = "javascript">
            var ten, tuoi;
            ten = prompt("Bạn hãy nhập tên của bạn: ");
            do {
                tuoi = prompt("Bạn hãy nhập tuổi của bạn: ", 20);
            } while (tuoi < 0);
            document.write("Chào bạn : <b> "+ ten + "</b>");
            document.write("<br>");
            document.write("Tuổi của bạn là : <u> "+ tuoi + "</u>");
        </script>
    </body>
</html>
