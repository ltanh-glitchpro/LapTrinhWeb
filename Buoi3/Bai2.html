<body>
    <form name = "form1">
        Hãy chọn màu nền:
        <select name = "optMauNen" onclick="document.bgColor = form1.optMauNen.value">
            <script language = "javascript">
                var mau = new Array("white", "gray", "red", "green", "blue", "magenta", "cyan", "yellow");

                    document.write('<option value = "' + mau[i] + '" >' + mau[i] + '</option>');

        </select>
    </form>
</body>
